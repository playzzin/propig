version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    groups:
      next-runtime:
        patterns:
          - next
          - react
          - react-dom
      firebase:
        patterns:
          - firebase
          - firebase-admin
          - firebase-functions

  - package-ecosystem: npm
    directory: /functions
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    groups:
      functions-runtime:
        patterns:
          - firebase-admin
          - firebase-functions
          - "@google/generative-ai"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: Asia/Seoul
