name: Firebase Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-deploy-main
  cancel-in-progress: false

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  DISABLE_SENTRY: "true"
  FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID || 'propig-63524' }}
  NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
  NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
  NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
  NEXT_PUBLIC_FIREBASE_DATABASE_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_DATABASE_ID || '(default)' }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
  GEMINI_ADMIN_UIDS: ${{ secrets.GEMINI_ADMIN_UIDS }}
  GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
  GEMINI_IMAGE_MODEL: ${{ vars.GEMINI_IMAGE_MODEL || 'gemini-2.5-flash-image' }}

jobs:
  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    if: github.repository == 'playzzin/propig'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Validate required GitHub Secrets
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          missing=0
          for name in \
            FIREBASE_SERVICE_ACCOUNT \
            NEXT_PUBLIC_FIREBASE_API_KEY \
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN \
            NEXT_PUBLIC_FIREBASE_PROJECT_ID \
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET \
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID \
            NEXT_PUBLIC_FIREBASE_APP_ID
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing GitHub Secret: $name"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix functions

      - name: Verify web app
        run: |
          npm run lint
          npm run type-check
          npm run build

      - name: Verify functions
        run: npm run build --prefix functions

      - name: Write functions runtime environment
        run: |
          {
            printf "GEMINI_MODEL=%s\n" "$GEMINI_MODEL"
            printf "GEMINI_IMAGE_MODEL=%s\n" "$GEMINI_IMAGE_MODEL"

            if [ -n "$GEMINI_ADMIN_UIDS" ]; then
              printf "GEMINI_ADMIN_UIDS=%s\n" "$GEMINI_ADMIN_UIDS"
            fi
          } > functions/.env

      - name: Install Firebase CLI
        run: npm install --global firebase-tools@15

      - name: Authenticate Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          credentials="$RUNNER_TEMP/firebase-service-account.json"
          printf "%s" "$FIREBASE_SERVICE_ACCOUNT" > "$credentials"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$credentials" >> "$GITHUB_ENV"

      - name: Sync Firebase Functions secrets
        run: |
          set_secret() {
            name="$1"
            value="$2"
            if [ -z "$value" ]; then
              echo "Skipping empty Firebase secret: $name"
              return 0
            fi

            secret_file="$RUNNER_TEMP/$name.txt"
            printf "%s" "$value" > "$secret_file"
            firebase functions:secrets:set "$name" \
              --project "$FIREBASE_PROJECT_ID" \
              --data-file "$secret_file" \
              --force
          }

          set_secret GEMINI_API_KEY "$GEMINI_API_KEY"
          set_secret GROK_API_KEY "$GROK_API_KEY"

      - name: Deploy Firebase
        run: |
          firebase deploy \
            --project "$FIREBASE_PROJECT_ID" \
            --only hosting,functions,firestore:rules,firestore:indexes,storage \
            --non-interactive
